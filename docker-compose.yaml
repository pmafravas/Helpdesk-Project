services:
  mariadb:
    image: mariadb:11.4
    container_name: helpdesk-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-RootP@ssw0rd!}
      MARIADB_DATABASE: HelpdeskDb
      MARIADB_USER: helpdesk_app
      MARIADB_PASSWORD: ${DB_APP_PASSWORD:-AppP@ssw0rd!}
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: helpdesk-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RMQ_PASS:-AdminP@ssw0rd!}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

volumes:
  mariadb_data:
  rabbitmq_data: